services:
  redis:
    image: redis:7-alpine
    container_name: meyouquize-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: meyouquize-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meyouquize
    ports:
      - "5432:5432"
    volumes:
      - meyouquize_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meyouquize"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  meyouquize_pgdata:
